<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AR Модель ЛР6</title>

  <!-- Подключаем библиотеку model-viewer -->
  <script type="module"
          src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #f2f2f2;
    }

    button[slot="ar-button"] {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      font-size: 16px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button[slot="ar-button"]:hover {
      background-color: #125ea8;
    }
  </style>
</head>
<body>

<model-viewer
    src="LR6.glb"
    ios-src="LR6.usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    ar-scale="auto"
    alt="3D модель ЛР6">

    <!-- КНОПКА ДЛЯ ПРОСМОТРА В AR -->
    <button slot="ar-button">
        📱 Смотреть в AR
    </button>

</model-viewer>

</body>
</html>
