<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AR Модель ЛР6</title>
  <script type="module"
          src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
  <style>
    body { margin: 0; }
    model-viewer { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

<model-viewer
    src="ЛР6.glb"
    ios-src="ЛР6.usdz"
    poster="poster.webp"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    ar-scale="auto"
    alt="3D модель ЛР6">
</model-viewer>

</body>
</html>
